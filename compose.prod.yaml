services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hojo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hojo_password}
      POSTGRES_DB: ${DB_NAME:-hojo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15973:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-hojo_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/milky1919/hojoget-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-hojo_user}:${DB_PASSWORD:-hojo_password}@db:5432/${DB_NAME:-hojo_db}
      API_KEY: ${API_KEY:-changeme}
    ports:
      - "18742:8000"

  frontend:
    image: ghcr.io/milky1919/hojoget-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
    ports:
      - "14823:3000"

  collector:
    image: ghcr.io/milky1919/hojoget-collector:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-hojo_user}:${DB_PASSWORD:-hojo_password}@db:5432/${DB_NAME:-hojo_db}
      JGRANTS_API_KEY: ${JGRANTS_API_KEY:-}

volumes:
  postgres_data:
